<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新标签页</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <!-- 背景层：支持自定义图片/视频背景 -->
  <div id="background-layer">
    <div id="background-overlay"></div>
  </div>

  <!-- 主内容区域 -->
  <main id="main-content">
    <!-- 组件容器：由 newtab.js 动态渲染各组件 -->
    <div id="components-grid"></div>
  </main>

  <!-- 设置按钮：固定在右下角 -->
  <button id="settings-btn" title="设置">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </button>

  <!-- 设置面板：侧滑抽屉 -->
  <div id="settings-panel" class="settings-panel">
    <div class="settings-header">
      <h2>设置</h2>
      <button id="settings-close" class="settings-close">&times;</button>
    </div>
    <div class="settings-body" id="settings-body"></div>
  </div>
  <div id="settings-overlay" class="settings-overlay"></div>

  <!-- 组件脚本：按依赖顺序加载 -->
  <script src="components/background.js"></script>
  <script src="components/clock.js"></script>
  <script src="components/search.js"></script>
  <script src="components/links.js"></script>
  <script src="components/notes.js"></script>
  <script src="components/bookmarks.js"></script>
  <script src="components/settings.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
